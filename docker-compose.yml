services:
  agent-poke:
    build: .
    image: agent-poke:local
    init: true
    environment:
      TZ: Europe/Istanbul
      AGENTS: codex claude
      CHECKIN_PROMPT: Hey!
      LOG_KEEP: 20
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b}
      RAW_AGENT_OUTPUT: 0
    volumes:
      - agent_home:/home/agent
      - ./logs:/app/logs
      - ./workspace:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  agent_home:
